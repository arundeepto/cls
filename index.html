<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #eef2f3; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 20px; }
        .input-group { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        .row-label { font-weight: 600; color: var(--accent); display: block; margin-bottom: 8px; }
        select, input { width: 100%; padding: 12px; margin: 5px 0; border: 1.5px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-view { background: var(--accent); color: white; }
        .btn-clear { background: #e74c3c; color: white; } /* নতুন বাটন */
        .btn-dl { background: #27ae60; color: white; }
        .btn-back { background: #95a5a6; color: white; margin-top: 10px; }

        #preview-section { display: none; }
        #capture-area { background: white; padding: 40px; width: 450px; margin: auto; }
        .logo-img { width: 90px; height: 90px; display: block; margin: 0 auto 15px auto; object-fit: contain; }
        .title-txt { font-size: 20px; font-weight: bold; color: #2c3e50; text-align: center; margin: 5px 0; }
        .batch-txt { font-size: 14px; color: #7f8c8d; text-align: center; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background: #34495e; color: white; padding: 12px; font-size: 14px; }
        td { border: 1px solid #bdc3c7; padding: 12px; text-align: center; font-size: 14px; color: #333; }
        .footer-text { text-align: right; margin-top: 20px; font-style: italic; font-size: 13px; color: #555; }
    </style>
</head>
<body>

<div class="container" id="input-section">
    <h2>Schedule Entry</h2>
    <input type="text" id="date" placeholder="Date">
    <div id="fields"></div>
    <button class="btn-view" onclick="showPreview()">Preview Schedule</button>
    <button class="btn-clear" onclick="clearAllData()">Clear All Data</button> <!-- ক্লিয়ার বাটন -->
</div>

<div id="preview-section">
    <div class="container">
        <div id="capture-area">
            <img src="l.jpg" class="logo-img" alt="Logo" onerror="this.style.display='none'">
            <div class="title-txt">Nilphamari Medical College</div>
            <div class="batch-txt">Batch: Arundeepto (8th Batch)</div>
            <div style="text-align: center; font-weight: bold; font-size: 18px; border-bottom: 2px solid #34495e; display: inline-block; width: 100%;">Class Schedule</div>
            <p style="text-align:center; margin-top: 10px;"><strong>Date: </strong><span id="res-date"></span></p>
            <table>
                <thead><tr><th>Time</th><th>Subject</th><th>Topic</th><th>Teacher</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
            <div class="footer-text">Prepared by: CR</div>
        </div>
        <button class="btn-dl" onclick="downloadImage()">Download as HD Image</button>
        <button class="btn-back" onclick="hidePreview()">Back to Edit</button>
    </div>
</div>

<script>
    const teacherData = {
        "Anatomy": ["Dr. Shamima Maam", "Dr. Farzana Maam", "Dr. Noman Sir", "Dr. Anup Sir", "Dr. Millat Sir"],
        "Biochemistry": ["Dr. Mazed Sir", "Dr. Ayesha Maam", "Dr. Hadiuzzaman Sir", "Dr. Hasinur Sir", "Dr. Naima Maam", "Dr Irin Maam"],
        "Physiology": ["Dr. Shila Maam", "Dr. Liza Maam", "Dr. Sara Maam", "Dr. Bipasha Maam", "Dr. Kashfi Maam", "Dr. Tritiya Maam"]
    };

    const scheduleTimes = ["08:00 - 10:00", "10:30 - 12:30", "12:30 - 14:30"];

    const container = document.getElementById('fields');
    scheduleTimes.forEach((time, index) => {
        container.innerHTML += `
            <div class="input-group">
                <span class="row-label">${time}</span>
                <select id="sub${index}" onchange="updateTeachers(${index}); saveAll()">
                    <option value="">Select Subject</option>
                    ${Object.keys(teacherData).map(sub => `<option value="${sub}">${sub}</option>`).join('')}
                </select>
                <input type="text" placeholder="Topic" id="top${index}" oninput="saveAll()">
                <select id="teach${index}" onchange="saveAll()">
                    <option value="">Select Teacher</option>
                </select>
            </div>
        `;
    });

    // সব ডাটা মুছে ফেলার ফাংশন
    function clearAllData() {
        if (confirm("আপনি কি নিশ্চিত সব ডাটা মুছে ফেলতে চান?")) {
            localStorage.removeItem('scheduleData');
            document.getElementById('date').value = new Date().toLocaleDateString('en-GB');
            scheduleTimes.forEach((_, i) => {
                document.getElementById(`sub${i}`).value = '';
                document.getElementById(`top${i}`).value = '';
                document.getElementById(`teach${i}`).innerHTML = '<option value="">Select Teacher</option>';
            });
        }
    }

    function updateTeachers(index) {
        const sub = document.getElementById(`sub${index}`).value;
        const teachSelect = document.getElementById(`teach${index}`);
        teachSelect.innerHTML = '<option value="">Select Teacher</option>';
        if (sub && teacherData[sub]) {
            teacherData[sub].forEach(t => {
                teachSelect.innerHTML += `<option value="${t}">${t}</option>`;
            });
        }
    }

    function saveAll() {
        const data = { date: document.getElementById('date').value };
        scheduleTimes.forEach((_, i) => {
            data[`sub${i}`] = document.getElementById(`sub${i}`).value;
            data[`top${i}`] = document.getElementById(`top${i}`).value;
            data[`teach${i}`] = document.getElementById(`teach${i}`).value;
        });
        localStorage.setItem('scheduleData', JSON.stringify(data));
    }

    function loadAll() {
        const saved = localStorage.getItem('scheduleData');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('date').value = data.date || new Date().toLocaleDateString('en-GB');
            scheduleTimes.forEach((_, i) => {
                document.getElementById(`sub${i}`).value = data[`sub${i}`] || '';
                updateTeachers(i);
                document.getElementById(`teach${i}`).value = data[`teach${i}`] || '';
                document.getElementById(`top${i}`).value = data[`top${i}`] || '';
            });
        } else {
            document.getElementById('date').value = new Date().toLocaleDateString('en-GB');
        }
    }

    function showPreview() {
        document.getElementById('input-section').style.display = 'none';
        document.getElementById('preview-section').style.display = 'block';
        document.getElementById('res-date').innerText = document.getElementById('date').value;
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        scheduleTimes.forEach((time, index) => {
            tbody.innerHTML += `<tr><td>${time}</td><td>${document.getElementById(`sub${index}`).value}</td><td>${document.getElementById(`top${index}`).value}</td><td>${document.getElementById(`teach${index}`).value}</td></tr>`;
        });
    }

    function downloadImage() {
        html2canvas(document.querySelector("#capture-area"), {scale: 3, backgroundColor: "#ffffff", useCORS: true}).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Class_Schedule_8th_Batch.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }

    function hidePreview() {
        document.getElementById('input-section').style.display = 'block';
        document.getElementById('preview-section').style.display = 'none';
    }

    loadAll();
</script>
</body>
</html>
